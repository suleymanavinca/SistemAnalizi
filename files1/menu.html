  /* ============================================================
     Sayfa Yükleme — URL parametresinden restoran ID'sini oku
  ============================================================ */
  const params      = new URLSearchParams(window.location.search);
  const restoranId  = parseInt(params.get('id')) || 1;
  const restoran    = RESTORANLAR[restoranId];

  /** Sepet verisini localStorage'dan oku */
  let sepet = JSON.parse(localStorage.getItem('sepet') || '[]');

  /** Sayfa yüklenince restoran bilgisi ve menüyü render et */
  window.addEventListener('DOMContentLoaded', () => {
    sayfaYukle();
    navSepetGuncelle();
  });

  /** sayfaYukle() — Restoran bilgi kutusunu ve menü kartlarını doldurur */
  function sayfaYukle() {
    document.title = `${restoran.ad} — LezzetKapı`;

    // Restoran Bilgi Kutusu
    document.getElementById('restoranLogo').textContent = restoran.logo;
    document.getElementById('restoranAd').textContent   = restoran.ad;
    document.getElementById('restoranMeta').innerHTML   =
      `${restoran.kategori} &nbsp;|&nbsp; ${restoran.puan} &nbsp;|&nbsp; ⏱ ${restoran.sure}`;
    document.getElementById('restoranRozet').innerHTML  =
      `<span class="rozet rozet-yesil">✅ Açık</span>`;

    // Menü Kategorileri ve Ürünler
    const kapsayici = document.getElementById('menuIcerigi');
    let html = '';

    for (const [kategori, urunler] of Object.entries(restoran.menu)) {
      html += `<div class="menu-kategori-baslik">${kategori}</div>`;
      html += `<div class="kart-izgara-2" style="margin-bottom:0.5rem;">`;
      for (const urun of urunler) {
        html += `
          <div class="kart urun-kart">
            <div class="urun-emoji">${urun.emoji}</div>
            <div class="urun-icerik">
              <div class="urun-ad">${urun.ad}</div>
              <div class="urun-aciklama">${urun.aciklama}</div>
              <div style="display:flex; align-items:center; justify-content:space-between; margin-top:0.4rem;">
                <span class="urun-fiyat">₺${urun.fiyat}</span>
                <button
                  class="btn btn-birincil"
                  onclick="sepeteEkle(${urun.id}, '${urun.ad.replace(/'/g,"\\'")}', ${urun.fiyat}, '${urun.emoji}', '${restoran.ad}')"
                >
                  + Sepete Ekle
                </button>
              </div>
            </div>
          </div>`;
      }
      html += `</div>`;
    }

    kapsayici.innerHTML = html;
  }

  /**
   * sepeteEkle() — Ürünü sepete ekler ve localStorage'a kaydeder.
   */
  function sepeteEkle(id, ad, fiyat, emoji, restoranAd) {
    const mevcutIndex = sepet.findIndex(s => s.id === id);
    if (mevcutIndex > -1) {
      sepet[mevcutIndex].adet++;
    } else {
      sepet.push({ id, ad, fiyat, emoji, restoranAd, adet: 1 });
    }
    localStorage.setItem('sepet', JSON.stringify(sepet));
    navSepetGuncelle();
    toastGoster(`✅ "${ad}" sepete eklendi!`);
  }

  /** navSepetGuncelle() — Navbar'daki sepet sayacını günceller */
  function navSepetGuncelle() {
    const toplam = sepet.reduce((t, u) => t + u.adet, 0);
    document.getElementById('navSepetSayi').textContent = toplam;
  }

  /** toastGoster() — Kısa bildirim mesajı gösterir */
  function toastGoster(mesaj) {
    const t = document.getElementById('toast');
    t.textContent = mesaj;
    t.classList.add('goster');
    setTimeout(() => t.classList.remove('goster'), 2500);
  }
